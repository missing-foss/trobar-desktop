# OpenSSF Scorecard (#31): scores repo security posture (Branch-Protection,
# Dependency-Update-Tool, SAST, Token-Permissions, Pinned-Dependencies, …) and
# publishes the result to the Security tab + the public Scorecard API (the
# badge). Weekly + on push to main. Treat the score as a punch-list, not a
# vanity metric.
#
# NOTE (org Actions allowlist): ossf/scorecard-action and github/codeql-action
# must be allowlisted in the org's Actions policy or this workflow will
# startup_failure (same policy that makes gitleaks run as a plain `run:` step).
# If the allowlist was set org-wide during trobar-server#123 it already covers
# this repo. Full Branch-Protection scoring also wants a classic PAT with repo
# scope stored as the SCORECARD_TOKEN secret; without it that check reads as
# inconclusive.
#
# SAST caveat (this repo): CodeQL does not support Dart, so the SAST check will
# score low — dart/flutter analyze in ci.yml is the practical equivalent but
# Scorecard won't credit it. Accepted, not chased (per #31).
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 6 * * 1" # Mondays, 06:27 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result to code scanning
      id-token: write # publish results to the Scorecard API (badge)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # A classic PAT (repo scope) gives Branch-Protection full visibility;
          # falls back to the default token, which scores most other checks.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: results.sarif
