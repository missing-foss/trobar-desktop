# Desktop release: builds Windows and macOS artifacts and publishes them to
# the GitHub Release for a desktop-vX.Y.Z tag, alongside the Linux tarball
# (which is still built and uploaded by hand — see packaging/package-linux.sh).
#
# Org Actions policy: GitHub-owned or verified-creator actions only.
# subosito/flutter-action and the actions/* actions below qualify; actual
# release creation and asset upload happens via `gh` in run: steps, not a
# third-party release action.
#
# Windows/macOS builds are unsigned (no code-signing cert, no Apple
# notarization — both paid, out of scope for this first pass). Users will
# see an "unidentified developer" style OS warning; see README.
name: release
on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing desktop-vX.Y.Z tag to (re)build and upload assets to (built from the selected branch's code). Leave blank for a plain build check."
        type: string
        required: false
      publish:
        description: "Create/update the GitHub Release and upload assets (leave off to just confirm the builds succeed)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package zip
        shell: pwsh
        run: |
          $ref = "${{ inputs.tag }}"; if (-not $ref) { $ref = "${{ github.ref_name }}" }
          $version = $ref -replace '^desktop-v', ''
          if (-not $version -or $version -eq $ref) { $version = "dev" }
          $out = "trobar-desktop-$version-windows-x64.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath $out
          echo "ASSET=$out" >> $env:GITHUB_ENV
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-zip
          path: ${{ env.ASSET }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package zip
        run: |
          ref="${{ inputs.tag }}"; [ -z "$ref" ] && ref="$GITHUB_REF_NAME"
          version="${ref#desktop-v}"
          if [ "$version" = "$ref" ]; then version="dev"; fi
          out="trobar-desktop-$version-macos.zip"
          # Glob the built .app rather than hard-coding a name: the macOS
          # PRODUCT_NAME is "Trobar" (branding, #21), so the bundle is
          # Trobar.app, not trobar_desktop.app. Fail loudly if it's missing.
          app=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          if [ -z "$app" ]; then echo "no .app found in Release/" >&2; exit 1; fi
          ditto -c -k --keepParent "$app" "$out"
          echo "ASSET=$out" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-zip
          path: ${{ env.ASSET }}

  release:
    needs: [build-windows, build-macos]
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: "*-zip"
          merge-multiple: true
      - name: Create or reuse release, upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "$TAG" --generate-notes
          gh release upload "$TAG" ./*.zip --repo "$GITHUB_REPOSITORY" --clobber
