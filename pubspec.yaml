name: trobar_desktop
description: "Trobar desktop sync client — syncs library selections onto SD cards and local folders for network-less DAPs."
publish_to: 'none'

version: 0.7.0+8

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.0
  file_selector: ^1.0.3
  path: ^1.9.0
  url_launcher: ^6.3.0
  package_info_plus: ^10.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo_bard.png
    # About screen: the app's own license, shown offline in-app.
    - LICENSE
  # Brand fonts (#22), bundled OFL .ttf to match Android/web — Space Grotesk is
  # the UI/body font (applied as the theme's fontFamily); Fredoka is reserved
  # for the "Trobar" wordmark. Attribution in THIRD_PARTY_NOTICES.md.
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/space_grotesk_regular.ttf
          weight: 400
        - asset: assets/fonts/space_grotesk_medium.ttf
          weight: 500
        - asset: assets/fonts/space_grotesk_semibold.ttf
          weight: 600
        - asset: assets/fonts/space_grotesk_bold.ttf
          weight: 700
    - family: Fredoka
      fonts:
        - asset: assets/fonts/fredoka_semibold.ttf
          weight: 600
        - asset: assets/fonts/fredoka_bold.ttf
          weight: 700
